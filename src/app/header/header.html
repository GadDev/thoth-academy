<header class="sticky top-0 z-50 bg-bg/85 backdrop-blur-xl border-b border-white/10">
  <nav
    class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between"
    aria-label="Main navigation"
  >
    <a routerLink="/" aria-label="Thoth Academy home" class="flex items-center gap-2.5">
      <img src="/logo.svg" alt="" aria-hidden="true" width="32" height="32" class="shrink-0" />
      <span class="text-xl font-bold text-primary">Thoth Academy</span>
    </a>

    <button
      type="button"
      [attr.aria-expanded]="menuOpen()"
      aria-controls="nav-menu"
      aria-label="Toggle navigation"
      (click)="menuOpen.set(!menuOpen())"
      class="md:hidden flex flex-col justify-center gap-1 w-9 h-9 bg-transparent border-none cursor-pointer p-1 rounded hover:bg-white/10 focus-visible:outline-2 focus-visible:outline-primary focus-visible:outline-offset-2"
    >
      <span class="block w-full h-0.5 bg-white/80 rounded transition-opacity"></span>
      <span class="block w-full h-0.5 bg-white/80 rounded transition-opacity"></span>
      <span class="block w-full h-0.5 bg-white/80 rounded transition-opacity"></span>
    </button>

    <ul
      id="nav-menu"
      [class.hidden]="!menuOpen()"
      role="list"
      class="md:flex md:items-center md:gap-1 absolute md:static top-16 md:top-auto left-0 right-0 md:left-auto md:right-auto flex-col md:flex-row bg-bg/97 md:bg-transparent border-b border-white/10 md:border-b-0 p-3 md:p-0 gap-0 md:gap-1"
    >
      <li>
        <a
          routerLink="/"
          routerLinkActive="text-white"
          [routerLinkActiveOptions]="{ exact: true }"
          class="block md:inline-block px-3 py-2 rounded-md text-sm font-medium text-white/65 hover:text-white hover:bg-white/10 transition-colors focus-visible:outline-2 focus-visible:outline-primary focus-visible:outline-offset-2"
        >
          Dashboard
        </a>
      </li>
      <li class="relative group">
        <button
          type="button"
          class="block w-full md:w-auto text-left px-3 py-2 rounded-md text-sm font-medium text-white/65 hover:text-white hover:bg-white/10 transition-colors focus-visible:outline-2 focus-visible:outline-primary focus-visible:outline-offset-2"
        >
          Weeks
          <svg
            class="inline ml-1"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            width="12"
            height="12"
          >
            <path d="M6 9l6 6 6-6" />
          </svg>
        </button>
        <ul
          role="list"
          class="md:absolute md:top-full md:left-0 md:mt-1 md:w-52 md:hidden group-hover:md:block bg-surface border border-white/10 rounded-xl overflow-hidden shadow-xl"
        >
          @for (w of [1, 2, 3, 4, 5]; track w) {
            <li>
              <a
                [routerLink]="['/week', w]"
                class="block px-4 py-2.5 text-sm text-white/65 hover:text-white hover:bg-white/5 transition-colors"
              >
                Week {{ w }}
              </a>
            </li>
          }
        </ul>
      </li>
      <li>
        <a
          routerLink="/resources"
          routerLinkActive="text-white"
          class="block md:inline-block px-3 py-2 rounded-md text-sm font-medium text-white/65 hover:text-white hover:bg-white/10 transition-colors focus-visible:outline-2 focus-visible:outline-primary focus-visible:outline-offset-2"
        >
          Resources
        </a>
      </li>
      <li>
        <a
          routerLink="/about"
          routerLinkActive="text-white"
          class="block md:inline-block px-3 py-2 rounded-md text-sm font-medium text-white/65 hover:text-white hover:bg-white/10 transition-colors focus-visible:outline-2 focus-visible:outline-primary focus-visible:outline-offset-2"
        >
          About
        </a>
      </li>
      <li>
        <a
          routerLink="/guide"
          routerLinkActive="text-white"
          class="block md:inline-block px-3 py-2 rounded-md text-sm font-medium text-white/65 hover:text-white hover:bg-white/10 transition-colors focus-visible:outline-2 focus-visible:outline-primary focus-visible:outline-offset-2"
        >
          Guide
        </a>
      </li>
      <li>
        <a
          routerLink="/react-angular"
          routerLinkActive="text-white"
          class="block md:inline-block px-3 py-2 rounded-md text-sm font-medium text-white/65 hover:text-white hover:bg-white/10 transition-colors focus-visible:outline-2 focus-visible:outline-primary focus-visible:outline-offset-2"
        >
          Cheat Sheet
        </a>
      </li>
      <li>
        <a
          routerLink="/coursera"
          routerLinkActive="text-white"
          class="block md:inline-block px-3 py-2 rounded-md text-sm font-medium text-amber-400/70 hover:text-amber-300 hover:bg-amber-400/5 transition-colors focus-visible:outline-2 focus-visible:outline-amber-400 focus-visible:outline-offset-2"
        >
          Coursera
        </a>
      </li>
    </ul>

    <app-theme-toggle />
  </nav>
</header>
